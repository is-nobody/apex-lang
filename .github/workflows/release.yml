name: Release

on:
  push:
    tags: ['*']
  workflow_dispatch:

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86-64_linux

          - os: ubuntu-24.04-arm
            target: arm64_linux

          - os: macos-latest
            target: x86-64_macos
            arch: x86_64

          - os: macos-latest
            target: arm64_macos
            arch: arm64

          - os: windows-latest
            target: x86-64_windows

          - os: windows-latest
            target: arm64_windows

    steps:
      - uses: actions/checkout@v4

      - name: Get version
        id: ver
        shell: bash
        run: echo "v=${{ github.ref_name }}" >> $GITHUB_OUTPUT

      - name: Build (Linux / macOS)
        if: runner.os != 'Windows'
        run: |
          if [ "${{ runner.os }}" == "macOS" ]; then
            export CFLAGS="-arch ${{ matrix.arch }}"
          fi
          cmake -S . -B build -DCMAKE_BUILD_TYPE=Release
          cmake --build build --parallel

      - name: Configure (Windows)
        if: runner.os == 'Windows'
        run: |
          if ("${{ matrix.target }}" -eq "arm64_windows") {
            cmake -S . -B build `
              -G "Ninja" `
              -DCMAKE_C_COMPILER=clang `
              -DCMAKE_SYSTEM_NAME=Windows `
              -DCMAKE_SYSTEM_PROCESSOR=ARM64 `
              -DCMAKE_C_FLAGS="--target=aarch64-w64-windows-msvc" `
              -DCMAKE_BUILD_TYPE=Release
          } else {
            cmake -S . -B build `
              -G "Ninja" `
              -DCMAKE_C_COMPILER=clang `
              -DCMAKE_BUILD_TYPE=Release
          }

      - name: Build (Windows)
        if: runner.os == 'Windows'
        run: cmake --build build --parallel

      - name: Prepare binary (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          cp build/apex.exe "apex_${{ steps.ver.outputs.v }}_${{ matrix.target }}.exe"

      - name: Prepare binary (Linux/macOS)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          cp build/apex "apex_${{ steps.ver.outputs.v }}_${{ matrix.target }}"

      - uses: actions/upload-artifact@v4
        with:
          name: apex_${{ steps.ver.outputs.v }}_${{ matrix.target }}${{ contains(matrix.target, 'windows') && '.exe' || '' }}
          path: apex_${{ steps.ver.outputs.v }}_${{ matrix.target }}${{ contains(matrix.target, 'windows') && '.exe' || '' }}

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Get version
        id: ver
        shell: bash
        run: echo "v=${{ github.ref_name }}" >> $GITHUB_OUTPUT

      - uses: softprops/action-gh-release@v2
        with:
          name: "Apex ${{ steps.ver.outputs.v }}"
          files: artifacts/*