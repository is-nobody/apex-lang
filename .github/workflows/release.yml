name: Release

on:
  push:
    tags: ['*']
  workflow_dispatch:

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64_linux

          - os: ubuntu-24.04-arm
            target: arm64_linux

          - os: macos-13
            target: x86_64_macos

          - os: macos-latest
            target: arm64_macos

          - os: windows-latest
            target: x86_64_windows
            arch: x64

          - os: windows-latest
            target: arm64_windows
            arch: arm64

    steps:
      - uses: actions/checkout@v4

      # --- Version ---
      - name: Get version
        id: ver
        run: echo "v=${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT

      # --- Linux Native ---
      - name: Build (Linux)
        if: runner.os == 'Linux'
        run: |
          cmake -S . -B build -DCMAKE_BUILD_TYPE=Release -DBUILD_STATIC=ON
          cmake --build build --parallel

      # --- macOS Native ---
      - name: Build (macOS)
        if: runner.os == 'macOS'
        run: |
          cmake -S . -B build -DCMAKE_BUILD_TYPE=Release -DBUILD_STATIC=ON
          cmake --build build --parallel

      # --- Windows MSVC ---
      - name: Configure MSVC (Windows)
        if: runner.os == 'Windows'
        run: |
          cmake -S . -B build `
            -DCMAKE_BUILD_TYPE=Release `
            -DBUILD_STATIC=ON `
            -A ${{ matrix.arch }}

      - name: Build MSVC (Windows)
        if: runner.os == 'Windows'
        run: cmake --build build --config Release --parallel

      # --- Prepare binary for upload ---
      - name: Prepare binary (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          VERSION="${{ steps.ver.outputs.v }}"
          TARGET="${{ matrix.target }}"
          cp build/Release/apex.exe "apex_${VERSION}_${TARGET}.exe"

      - name: Prepare binary (Linux/macOS)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          VERSION="${{ steps.ver.outputs.v }}"
          TARGET="${{ matrix.target }}"
          cp build/apex "apex_${VERSION}_${TARGET}"

      - uses: actions/upload-artifact@v4
        with:
          name: apex_${{ steps.ver.outputs.v }}_${{ matrix.target }}${{ contains(matrix.target, 'windows') && '.exe' || '' }}
          path: apex_${{ steps.ver.outputs.v }}_${{ matrix.target }}${{ contains(matrix.target, 'windows') && '.exe' || '' }}

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Get version
        id: ver
        run: echo "v=${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT

      - uses: softprops/action-gh-release@v2
        with:
          name: "Apex ${{ steps.ver.outputs.v }}"
          files: artifacts/*