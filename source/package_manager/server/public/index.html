<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apex Package Registry</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; max-width: 800px; margin: 0 auto; padding: 20px; background: #f9f9f9; }
        h1 { color: #2c3e50; border-bottom: 2px solid #3498db; padding-bottom: 10px; }
        .pkg-list { list-style: none; padding: 0; }
        .pkg-item { background: white; margin: 10px 0; padding: 15px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); display: flex; justify-content: space-between; align-items: center; }
        .btn { background: #3498db; color: white; padding: 8px 15px; text-decoration: none; border-radius: 4px; font-weight: bold; }
        .btn:hover { background: #2980b9; }
    </style>
</head>
<body>
    <h1>📦 Apex Package Registry</h1>
    <p>Welcome to the official Apex language package manager.</p>
    
    <h2>Available Packages</h2>
    <ul id="packages" class="pkg-list">
        <li>Loading packages...</li>
    </ul>

    <script>
        async function loadPackages() {
            const res = await fetch('/api/packages');
            const pkgs = await res.json();
            const list = document.getElementById('packages');
            list.innerHTML = '';
            if (pkgs.length === 0) {
                list.innerHTML = '<li>No packages published yet. Be the first!</li>';
                return;
            }
            pkgs.forEach(pkg => {
                const li = document.createElement('li');
                li.className = 'pkg-item';
                li.innerHTML = `
                    <span><strong>${pkg.name}</strong> <small style="color:gray">(${new Date(pkg.created_at).toLocaleDateString()})</small></span>
                    <a href="/api/packages/${pkg.name}/download" class="btn">Download .zip</a>
                `;
                list.appendChild(li);
            });
        }
        loadPackages();
    </script>
</body>
</html>
